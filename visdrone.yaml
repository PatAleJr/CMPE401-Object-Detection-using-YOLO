# VisDrone detection dataset config for Ultralytics training/validation split
# Each dataset root is expected to contain matching images/ and labels/ folders.
train: ../../../ML-Data/VisDrone2019-DET-train/images
val: ../../../ML-Data/VisDrone2019-DET-val/images
eval: ../../../ML-Data/VisDrone2019-DET-test-dev/images

names:
  0: pedestrian
  1: people
  2: bicycle
  3: car
  4: van
  5: truck
  6: tricycle
  7: awning-tricycle
  8: bus
  9: motor
